<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorder — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Gorder</h1>
            <p class="auth-subtitle">Log in to your account</p>
            <div id="error" class="auth-error hidden"></div>
            <form id="login-form" class="auth-form">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="username" autocomplete="username" autofocus>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                <button type="submit" id="submit-btn">Sign in</button>
            </form>
            <p class="auth-footer">No account? <a href="/register">Create one</a></p>
        </div>
    </div>
    <script>
        const form = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorDiv = document.getElementById("error");
        const submitBtn = document.getElementById("submit-btn");
        function showError(msg) { errorDiv.textContent = msg; errorDiv.classList.remove("hidden"); }
        function hideError() { errorDiv.classList.add("hidden"); }
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            hideError();
            var u = usernameInput.value.trim();
            var p = passwordInput.value;
            if (!u || !p) { showError("Please fill in both fields."); return; }
            if (u.length < 3) { showError("Username must be at least 3 characters."); return; }
            if (p.length < 5) { showError("Password must be at least 5 characters."); return; }
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";
            fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: u, password: p})
            })
            .then(function(res) {
                if (res.ok) { window.location.href = "/"; }
                else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Sign in";
                    return res.json().then(function(data) { showError(data.error || "Invalid username or password."); });
                }
            })
            .catch(function() {
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign in";
                showError("Network error. Please try again.");
            });
        });
    </script>
</body>
</html>
