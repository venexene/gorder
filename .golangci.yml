linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell 
    - unconvert
    - goconst

linters-settings:
  goconst:
    min-len: 4
    min-occurrences: 3
  misspell:
    locale: US

issues:
  exclude:
    - path: migrations/
      linters: all
    - path: testdata/
      linters: all
    - path: cmd/emulator/
      linters: all
    - path: cmd/gen-token/
      linters: all
    - path: embed.go
      linters: all
    - path: _test\.go
      linters:
        - errcheck

run:
  timeout: 5m
