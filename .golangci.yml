linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell 
    - unconvert
    - goconst

linters-settings:
  goconst:
    min-len: 5
    min-occurrences: 4
  misspell:
    locale: US

issues:
  exclude-dirs:
    - migrations
    - testdata
  exclude-files:
    - "cmd/emulator/.*"
    - "cmd/gen-token/.*"
    - "embed\\.go"
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst

run:
  timeout: 5m
