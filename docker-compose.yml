services:

  db:
    image: postgres:18
    container_name: gorder-database
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orders-network


  app:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
    container_name: gorder-app
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${HTTP_PORT}/health/live || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 3
      start_period: 10s
    environment:
       - HTTP_PORT=${HTTP_PORT}
       - CACHE_CAPACITY=${CACHE_CAPACITY}
       - LOG_FORMAT=${LOG_FORMAT}
       - JWT_SECRET=${JWT_SECRET}
       - RATE_LIMIT=${RATE_LIMIT}
       - RATE_LIMIT_REGISTER=${RATE_LIMIT_REGISTER}
       - DB_HOST=${DB_HOST}
       - DB_PORT=${DB_PORT}
       - DB_USER=${DB_USER}
       - DB_PASSWORD=${DB_PASSWORD}
       - DB_NAME=${DB_NAME}
       - DB_SSL_MODE=${DB_SSL_MODE}
       - MIGRATION_DIR=${MIGRATION_DIR}
       - KAFKA_BROKERS=${KAFKA_BROKERS}
       - KAFKA_TOPIC=${KAFKA_TOPIC}
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    networks:
      - orders-network
    restart: unless-stopped

  
  kafka:
    image: apache/kafka:4.0.0
    container_name: gorder-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 40s
    networks:
      - orders-network
    restart: unless-stopped
    

  kafka-topics-setup:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
      sleep 15;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists
      --bootstrap-server kafka:9092
      --topic $${KAFKA_TOPIC}
      --partitions 1
      --replication-factor 1
      "
    networks:
      - orders-network
    restart: on-failure


  kafka-emulator:
    build:
      context: .
      dockerfile: cmd/emulator/Dockerfile
    volumes:
      - ./testdata:/app/testdata
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-setup:
        condition: service_completed_successfully
    networks:
      - orders-network
    restart: on-failure


  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: gorder-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - orders-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2
    container_name: gorder-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - orders-network
    restart: unless-stopped


volumes:
  postgres_data:
  kafka_data:
  prometheus_data:
  grafana_data:


networks:
  orders-network:
    driver: bridge